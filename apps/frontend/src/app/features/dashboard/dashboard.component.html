<div class="min-h-screen bg-gray-950">
  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🐴</span>
      <div>
        <h1 class="text-white font-bold text-lg leading-tight">Manga Larga</h1>
        <p class="text-gray-400 text-xs">Clínica Equina</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-gray-300 text-sm hidden sm:block">
        Olá, <span class="font-semibold text-indigo-400">{{ userName() }}</span>
        @if (isAdmin()) { <span class="ml-2 px-2 py-0.5 rounded-full bg-amber-900/50 text-amber-300 text-xs">Admin</span> }
      </span>
      <button
        (click)="logout()"
        class="px-4 py-2 text-sm text-gray-300 hover:text-white border border-gray-700 hover:border-gray-500 rounded-lg transition"
      >
        Sair
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-6 py-10">
    <h2 class="text-2xl font-bold text-white mb-2">Dashboard</h2>
    <p class="text-gray-400 mb-8">Selecione uma área para gerenciar</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Cavalos -->
      <a routerLink="/cavalos"
         class="group bg-gray-900 border border-gray-800 hover:border-indigo-600 rounded-2xl p-6 transition-all duration-200 hover:shadow-lg hover:shadow-indigo-900/30">
        <div class="text-4xl mb-4">🐎</div>
        <h3 class="text-white font-semibold text-lg group-hover:text-indigo-300 transition">Cavalos</h3>
        <p class="text-gray-400 text-sm mt-1">Gerenciar cadastro de cavalos</p>
      </a>

      <!-- Sessões -->
      <a routerLink="/sessoes"
         class="group bg-gray-900 border border-gray-800 hover:border-emerald-600 rounded-2xl p-6 transition-all duration-200 hover:shadow-lg hover:shadow-emerald-900/30">
        <div class="text-4xl mb-4">🩺</div>
        <h3 class="text-white font-semibold text-lg group-hover:text-emerald-300 transition">Sessões Fisio</h3>
        <p class="text-gray-400 text-sm mt-1">Gerenciar sessões de fisioterapia</p>
      </a>

      <!-- Admin -->
      @if (isAdmin()) {
        <a routerLink="/admin/users"
           class="group bg-gray-900 border border-gray-800 hover:border-amber-600 rounded-2xl p-6 transition-all duration-200 hover:shadow-lg hover:shadow-amber-900/30">
          <div class="text-4xl mb-4">👥</div>
          <h3 class="text-white font-semibold text-lg group-hover:text-amber-300 transition">Usuários</h3>
          <p class="text-gray-400 text-sm mt-1">Gerenciar contas e acessos</p>
        </a>
      }
    </div>
  </main>
</div>
